name: Build and Release Plugin

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build plugin
      run: cd CodeLocatorPlugin && ../gradlew buildPlugin -x instrumentCode

    - name: Get plugin version
      id: plugin_version
      working-directory: CodeLocatorPlugin
      run: |
        VERSION=$(grep "def myVersion" build.gradle | sed "s/.*'\(.*\)'.*/\1/")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Plugin version: $VERSION"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: plugin-build-${{ steps.plugin_version.outputs.version }}
        path: CodeLocatorPlugin/build/distributions/*.zip

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        name: CodeLocator Plugin v${{ steps.plugin_version.outputs.version }}
        body: |
          ## CodeLocator Plugin Release

          ### Version: ${{ steps.plugin_version.outputs.version }}

          **Changes in this release:**
          - Auto-built from commit: ${{ github.sha }}

          **Installation:**
          1. Download the CodeLocatorPlugin-${{ steps.plugin_version.outputs.version }}.zip file
          2. In IntelliJ IDEA/Android Studio, go to Settings > Plugins
          3. Click the gear icon and select "Install Plugin from Disk..."
          4. Select the downloaded zip file
          5. Restart the IDE

          **Requirements:**
          - IntelliJ IDEA 2023.2+ or Android Studio
          - Java 17+
        files: |
          CodeLocatorPlugin/build/distributions/*.zip
        draft: false
        prerelease: false
